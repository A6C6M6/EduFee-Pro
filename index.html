<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | My-Kids-Hub</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; height: 100vh; justify-content: center; align-items: center; }
        .main-wrapper { display: flex; width: 900px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .left-section { width: 45%; background: #0056b3; color: white; padding: 40px; }
        .right-section { width: 55%; padding: 40px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="left-section">
            <h1>My-Kids-Hub</h1>
            <p>Smart School. Happy Parents. Bright Future.</p>
        </div>
        <div class="right-section">
            <form id="loginForm">
                <h2>Welcome Back!</h2>
                <label>Email Address</label>
                <input type="email" required>
                <label>Password</label>
                <input type="password" id="password" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Login Successful!");
        });
    </script>
</body>
</html>
