<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Tracker | Enterprise Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body class="bg-slate-50">

    <div id="app" class="flex min-h-screen">

        <aside id="sidebar"
               class="w-64 bg-white border-r border-slate-200 p-4">

            <h2 class="text-xl font-bold text-green-700 mb-6">
                Agri Tracker
            </h2>

            <div id="nav-menu"></div>

        </aside>

        <main class="flex-1">

            <header id="top-header"
                    class="sticky top-0 z-10 bg-white border-b border-slate-200 p-4">

                <h1 class="text-2xl font-semibold">
                    Dashboard
                </h1>

            </header>

            <section id="page-content" class="p-6">

                <div class="bg-white rounded-xl shadow p-6">
                    <h2 class="text-xl font-bold mb-2">
                        Welcome to Agri Tracker
                    </h2>

                    <p class="text-slate-600">
                        Enterprise Agriculture Management Dashboard
                    </p>
                </div>

            </section>

        </main>

    </div>

    <div id="toast-container"
         class="fixed top-5 right-5 z-50 space-y-2">
    </div>

    <script src="assets/js/router.js"></script>
    <script src="assets/js/dashboard.js"></script>

</body>
</html>
